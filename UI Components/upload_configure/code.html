<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ListMate - Upload &amp; Configure</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1ddd33",
                        "background-light": "#f6f8f6",
                        "background-dark": "#112113",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom scrollbar for horizontal marketplace selector */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen font-display flex flex-col">
<!-- Header -->
<header class="sticky top-0 z-50 flex items-center justify-between p-4 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800">
<div class="flex items-center gap-2">
<div class="size-8 rounded-lg bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-background-dark">bolt</span>
</div>
<h1 class="text-xl font-bold tracking-tight text-slate-900 dark:text-slate-100">ListMate</h1>
</div>
<button class="size-10 rounded-full flex items-center justify-center bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined">account_circle</span>
</button>
</header>
<main class="flex-1 max-w-2xl mx-auto w-full p-4 pb-32">
<!-- Step Indicator -->
<div class="mb-6 flex items-center gap-2">
<span class="text-xs font-bold uppercase tracking-widest text-primary">Step 1 of 2</span>
<div class="h-1 flex-1 bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden">
<div class="h-full w-1/2 bg-primary"></div>
</div>
</div>
<section class="mb-8">
<h2 class="text-2xl font-bold mb-2">Upload Photos</h2>
<p class="text-slate-600 dark:text-slate-400 mb-4">Add 3-5 clear photos of your item for best AI results.</p>
<div class="grid grid-cols-3 gap-3">
<div class="aspect-square rounded-xl border-2 border-dashed border-slate-300 dark:border-slate-700 flex flex-col items-center justify-center gap-2 bg-slate-50 dark:bg-slate-900/50 hover:border-primary dark:hover:border-primary transition-colors cursor-pointer">
<span class="material-symbols-outlined text-primary">add_a_photo</span>
<span class="text-xs font-medium">Main</span>
</div>
<div class="aspect-square rounded-xl border-2 border-dashed border-slate-300 dark:border-slate-700 flex flex-col items-center justify-center gap-2 bg-slate-50 dark:bg-slate-900/50 hover:border-primary dark:hover:border-primary transition-colors cursor-pointer text-slate-400">
<span class="material-symbols-outlined">add</span>
</div>
<div class="aspect-square rounded-xl border-2 border-dashed border-slate-300 dark:border-slate-700 flex flex-col items-center justify-center gap-2 bg-slate-50 dark:bg-slate-900/50 hover:border-primary dark:hover:border-primary transition-colors cursor-pointer text-slate-400">
<span class="material-symbols-outlined">add</span>
</div>
</div>
</section>
<!-- Seller Notes Section -->
<section class="mb-8">
<div class="flex flex-col gap-2">
<label class="text-lg font-semibold flex items-center gap-2" for="seller-notes">
                    Raw Seller Notes
                    <span class="material-symbols-outlined text-sm text-slate-400" title="Mention flaws, size, or unique features">info</span>
</label>
<textarea class="w-full min-h-[160px] rounded-xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900/50 p-4 text-base focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400" id="seller-notes" placeholder="e.g., blue denim jacket, size S-XL, machine washable, slightly worn collar..."></textarea>
</div>
</section>
<!-- Marketplace Selector -->
<section class="mb-8">
<h2 class="text-lg font-semibold mb-4">Select Marketplaces</h2>
<div class="flex gap-4 overflow-x-auto no-scrollbar pb-2">
<!-- Amazon -->
<button class="flex-shrink-0 flex flex-col items-center gap-2 group">
<div class="size-16 rounded-xl bg-white dark:bg-slate-800 border-2 border-primary flex items-center justify-center p-2 shadow-sm transition-transform active:scale-95">
<img alt="Amazon Logo" class="w-full h-auto" data-alt="Amazon marketplace brand logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCY47dgH609LMf32mdBkKDSbn4SLTqKKLXEojc3ShjU0UVQg8Tn95ln6iKQUIUEhYV2ppnKx-4hruH_jS2sRsSksLIKV9KWFoP-vGZEziO30VilTGsLCtcLv3lh4PMtRFTgan98BD_2VMXred8n73uInrKXCkX3Muy0uFtKP2GrEBwLxt6VXBIux4ptLZUcw6-dGLBcnbzTav53JZzp8cDkGw98mJs5zGsLGyLncfbrmbXNFyba_5EjGpxVETU9Whe5K_15i8547Lc"/>

<!-- Etsy -->

<div class="size-16 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 flex items-center justify-center p-2 shadow-sm transition-transform active:scale-95">
<img alt="Etsy Logo" class="w-full h-auto" data-alt="Etsy marketplace brand logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC_ylQEWg0S_6QVcXJCW-61Wt3RdhBpJRAmXMgfW7r7miKAchIOhUR9UMBn-7lRbglNNiUaGOp9o_T28adZI0OemWSJfBDsFlqeNZhXanI42DO_vm4-5SP4NDLf63xFTIKlkMvkqQSx_MEIDopLPsguOwWA9UWlmEbC_1d1twX3dXW0IqlKG8PcgbPCUJqU4Q_7GSz0tyvQBtqCf3siqo1AL4DA0bn13shJt2mEwwqfkyHJl_U74iKIrky2CtrCdXfNegNNEnGQ-cw"/>
</div>
<span class="text-xs font-medium opacity-60">Etsy</span>
</button>
<!-- eBay -->
<button class="flex-shrink-0 flex flex-col items-center gap-2 group">
<div class="size-16 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 flex items-center justify-center p-2 shadow-sm transition-transform active:scale-95">
<img alt="eBay Logo" class="w-full h-auto" data-alt="eBay marketplace brand logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA0piHsfVHTf9EkGaIPl03tYMiUterWWZ3RtjjFPQn_KRl8A7UbZOET4yVNvhKkfiKnXDKEe46yIjcj6mjmi_C30yGOdQFIG-ql_Plb34RSp20t8vCp77PdDUQwoC5Z0mK6ukrlMhX9OHR9mbz34kRkqib2hSJUKXItjZtgrdUbQHpve7XZS6-nLFQy0wYU53XLhS2l8YipcHBFUytPUD95A8ZbKNmrkUXuhLUaAoqAlK8vmsm1cxoDlGa-EmFzafZN39uTQCAkLls"/>
</div>

</button>
<!-- Walmart -->
<button class="flex-shrink-0 flex flex-col items-center gap-2 group">
<div class="size-16 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 flex items-center justify-center p-2 shadow-sm transition-transform active:scale-95">
<img alt="Walmart Logo" class="w-full h-auto" data-alt="Walmart marketplace brand logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAgLrOgJLz_OsPEh1qJN8Wsv5O_YEcE6Ekiq4FejUZQuLjLiMmS2Ikj1BtHqv4uyUIx6T45AXvRkILqWWRUr7bnESqYsOg4OzLY4w8yXIHCiljV20wjJNPKujB7pyZEFlZcFyOfvyV1WJPKj8L8y35uln5gK3TIgocUzCwJH7sTg_2yQ_1dWcHzRrpkzv2KyPX13Datj2JhwKoyyQidd59s7wSBcMRLwMPa_ySnWRzphQUQNKf6XhcrZG5frlYDFznOiQ_uGKa9wMc"/>

<span class="text-xs font-medium opacity-60">Walmart</span>

<!-- Shopify -->
<button class="flex-shrink-0 flex flex-col items-center gap-2 group">
<div class="size-16 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 flex items-center justify-center p-2 shadow-sm transition-transform active:scale-95">
<img alt="Shopify Logo" class="w-full h-auto" data-alt="Shopify marketplace brand logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCzUfmZ217IZlwMMODWxBBFloF7rLooovFQxlUxHDBLP9oiZSx2eBntF98USm4_4Dpga2p5KQFh6RVHoxfQJHEz_ZdCR-c_4nbKurxATdK1UyzG2Cy6iGk0r21SByI6SMnGEd47O4ZrkjM8lFh0sk8LWAJXWbnVH9PeRKVeDTriellKkED9R4PAHOSPhuHDiJ_YebsVMY7-tDNUxsmXlsUAP5ZysTy-RGW4xXRDwRsN_eOgwFyoJAy7Bh-Rrx2pDdjHxslcix4_qRs"/>
</div>
<span class="text-xs font-medium opacity-60">Shopify</span>
</button>
</div>
</section>
</main>
<!-- Bottom Navigation & Action -->
<div class="fixed bottom-0 left-0 right-0 p-4 bg-background-light dark:bg-background-dark border-t border-slate-200 dark:border-slate-800 flex flex-col gap-4">
<button class="w-full bg-primary text-background-dark py-4 rounded-xl font-bold text-lg flex items-center justify-center gap-2 shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all">
<span class="material-symbols-outlined">auto_awesome</span>
            Generate Listing
        </button>
<!-- Bottom Nav Icons -->
<nav class="flex justify-around items-center pt-2">
<a class="flex flex-col items-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined">upload</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Upload</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">list_alt</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Listings</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">bar_chart</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Insights</span>
</a>
<a class="flex flex-col items-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">settings</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Settings</span>
</a>
</nav>
</div>
</body></html>
